name: Build LawRun Kernel
on:
  workflow_dispatch:

jobs:
  build:
    name: Building LawRun Kernel for RMX1971
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      TZ: Africa/Cairo
      USE_CCACHE: "true"
      DEVICE_CODENAME: "RMX1971"
      # تأكد إن ده اسم الـ defconfig الصح في LawRun
      KERNEL_DEFCONFIG: nanu_perf_defconfig
      # رابط الـ Clang ده مستقر جداً
      CLANG_DL_LINK: "https://android.googlesource.com/platform//prebuilts/clang/host/linux-x86/+archive/ba7da711271d310dda6b5134d8f4448f6a276a27/clang-r498229b.tar.gz"

    steps:
    - name: 📥 Checkout Kernel Source
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: ⚡ Set up ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        max-size: "2G"
        key: build-kernel-google-r498229b-${{ env.DEVICE_CODENAME }}

    - name: 🛠 Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get -y install --no-install-recommends \
             bc bison build-essential binutils ca-certificates cpio curl \
             device-tree-compiler flex git git-lfs libssl-dev \
             make python3 python-is-python3 unzip zip xz-utils \
             libelf-dev libncurses5-dev llvm lld \
             gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

    - name: 📥 Download Google r498229b (Robust)
      run: |
        mkdir -p clang
        echo ">>> Downloading Clang r498229b..."
        # We add --user-agent and --tries to prevent hanging
        wget -q --user-agent="Mozilla/5.0" --tries=5 --retry-connrefused -O clang.tar.gz "${{ env.CLANG_DL_LINK }}"
        
        echo ">>> Extracting..."
        tar -C clang/ -zxf clang.tar.gz
        
        # Verify if it actually downloaded
        if [ ! -d "clang/bin" ]; then
          echo "!!! CLANG DOWNLOAD FAILED !!!"
          exit 1
        fi
        
        echo ">>> Clang ready at $(pwd)/clang/bin"
        echo "$(pwd)/clang/bin" >> $GITHUB_PATH

    - name: 🛠 Manual KernelSU Next Injection
      run: |
        # تنظيف وحقن الكود يدوياً لضمان عدم حدوث Error 128
        rm -rf drivers/kernelsu
        mkdir -p drivers/kernelsu
        curl -LSs https://github.com/KernelSU-Next/KernelSU/archive/refs/heads/main.tar.gz | tar -xzC drivers/kernelsu --strip-components=1
        
        # تعديل الـ Kconfig والـ Makefile
        grep -q "kernelsu" drivers/Kconfig || echo 'source "drivers/kernelsu/Kconfig"' >> drivers/Kconfig
        grep -q "kernelsu" drivers/Makefile || echo 'obj-y += kernelsu/' >> drivers/Makefile
        
        # تفعيل الإعدادات في الـ Defconfig
        echo "CONFIG_KSU=y" >> arch/arm64/configs/${{ env.KERNEL_DEFCONFIG }}
        echo "CONFIG_KSU_NEXT=y" >> arch/arm64/configs/${{ env.KERNEL_DEFCONFIG }}

    - name: 🏗 Build Kernel
      run: |
        export PATH=$(pwd)/clang/bin:$PATH
        export ARCH=arm64
        export SUBARCH=arm64

        echo ">>> Building Config..."
        make O=out ${{ env.KERNEL_DEFCONFIG }}

        echo ">>> Building Kernel..."
        make O=out -j$(nproc --all) \
              LLVM=1 \
              LLVM_IAS=1 \
              CC="ccache clang" \
              LD=ld.lld \
              AR=llvm-ar \
              NM=llvm-nm \
              OBJCOPY=llvm-objcopy \
              OBJDUMP=llvm-objdump \
              STRIP=llvm-strip \
              CLANG_TRIPLE=aarch64-linux-gnu- \
              CROSS_COMPILE=aarch64-linux-gnu- \
              CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
              KCFLAGS="-w -Wno-error=int-conversion -Wno-error=incompatible-pointer-types -Wno-error=unused-command-line-argument -Wno-error=address-of-packed-member"

    - name: 🚀 Create Flashable Zip (AnyKernel3)
      run: |
        git clone --depth=1 https://github.com/KernelSU-Next/AnyKernel3.git -b master ak3
        cp out/arch/arm64/boot/Image.gz-dtb ak3/
        cd ak3 && zip -r9 ../LawRun-KSUN-RMX1971.zip *

    - name: 🚀 Upload Release
      uses: softprops/action-gh-release@v2
      with:
        # ملاحظة: تأكد إن عندك Secret اسمه GH_PAT فيه الـ Token بتاعك
        token: ${{ secrets.GITHUB_TOKEN }} 
        tag_name: "Build-${{ github.run_number }}"
        name: "LawRun Kernel + KSUN #${{ github.run_number }}"
        files: |
          LawRun-KSUN-RMX1971.zip
          out/arch/arm64/boot/Image.gz-dtb
