name: Build LawRun Kernel (Verified Link Edition)
on:
  workflow_dispatch:

jobs:
  build:
    name: Building LawRun Kernel for RMX1971
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      TZ: Africa/Cairo
      DEVICE_CODENAME: "RMX1971"
      KERNEL_DEFCONFIG: nanu_perf_defconfig
      # الرابط اللي إنت بعته (الخلاصة)
      CLANG_DL_LINK: "https://android.googlesource.com/platform//prebuilts/clang/host/linux-x86/+archive/b669748458572622ed716407611633c5415da25c/clang-r416183b.tar.gz"

    steps:
    - name: 📥 Checkout Kernel Source (LawRun)
      uses: actions/checkout@v4
      with:
        path: kernel-source
        fetch-depth: 1

    - name: 📥 Checkout KernelSU (Official)
      uses: actions/checkout@v4
      with:
        repository: tiann/KernelSU
        path: ksu-src
        fetch-depth: 1

    - name: 🛠 Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get -y install --no-install-recommends \
             bc bison build-essential binutils ca-certificates cpio curl \
             device-tree-compiler flex git libssl-dev \
             make python3 python-is-python3 unzip zip xz-utils \
             libelf-dev libncurses5-dev llvm lld \
             gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

    - name: 📥 Download and Extract Clang (Verified)
      run: |
        mkdir -p clang
        echo ">>> Downloading Clang..."
        # الرابط ده بيحتاج -L عشان الـ Redirects
        curl -LSs "${{ env.CLANG_DL_LINK }}" -o clang.tar.gz
        
        echo ">>> Extracting..."
        # جوجل بتبعت الـ archive ده بتنسيق tar عادي بدون gzip أحياناً، فـ -xf هي الأضمن
        tar -xf clang.tar.gz -C clang/
        
        rm clang.tar.gz
        echo "$(pwd)/clang/bin" >> $GITHUB_PATH
        echo ">>> Clang ready at $(pwd)/clang/bin"

    - name: 🛠 Move KSU and Patch Kernel
      run: |
        rm -rf kernel-source/drivers/kernelsu
        mkdir -p kernel-source/drivers/kernelsu
        cp -r ksu-src/kernel/* kernel-source/drivers/kernelsu/
        
        cd kernel-source
        if ! grep -q "kernelsu" drivers/Kconfig; then
          echo 'source "drivers/kernelsu/Kconfig"' >> drivers/Kconfig
        fi
        if ! grep -q "kernelsu" drivers/Makefile; then
          echo 'obj-y += kernelsu/' >> drivers/Makefile
        fi
        echo "CONFIG_KSU=y" >> arch/arm64/configs/${{ env.KERNEL_DEFCONFIG }}
        echo ">>> KSU Injected!"

    - name: 🏗 Build Kernel
      run: |
        cd kernel-source
        export ARCH=arm64
        export SUBARCH=arm64
        export PATH=$(pwd)/../clang/bin:$PATH
        
        echo ">>> Initializing Config..."
        # 1. إنشاء الـ .config المبدئي من الـ defconfig
        make O=out ${{ env.KERNEL_DEFCONFIG }}
        
        # 2. حل مشكلة الـ Interactive Prompts (الخلاصة)
        # الأمر ده بيوافق على كل الإعدادات الجديدة بالـ Default بتاعها
        make O=out olddefconfig
        
        echo ">>> Starting Actual Compilation..."
        # 3. البناء الفعلي
        make O=out -j$(nproc --all) \
              CC=clang \
              CLANG_TRIPLE=aarch64-linux-gnu- \
              CROSS_COMPILE=aarch64-linux-android- \
              CROSS_COMPILE_ARM32=arm-linux-androideabi- \
              LD=ld.lld \
              AR=llvm-ar \
              NM=llvm-nm \
              OBJCOPY=llvm-objcopy \
              OBJDUMP=llvm-objdump \
              STRIP=llvm-strip \
              KCFLAGS="-w"

    - name: 🚀 Create Flashable Zip (AnyKernel3)
      run: |
        git clone --depth=1 https://github.com/KernelSU-Next/AnyKernel3.git -b master ak3
        # التأكد من وجود ملف الـ Image
        if [ -f kernel-source/out/arch/arm64/boot/Image.gz-dtb ]; then
          cp kernel-source/out/arch/arm64/boot/Image.gz-dtb ak3/
        elif [ -f kernel-source/out/arch/arm64/boot/Image ]; then
          cp kernel-source/out/arch/arm64/boot/Image ak3/
        fi
        cd ak3 && zip -r9 ../LawRun-KSUN-RMX1971.zip *

    - name: 🚀 Upload Release
      uses: softprops/action-gh-release@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        tag_name: "Build-${{ github.run_number }}"
        name: "LawRun Kernel + KSUN #${{ github.run_number }}"
        files: LawRun-KSUN-RMX1971.zip
