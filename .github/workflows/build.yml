name: Build LawRun Kernel (Final Fixed Edition)
on:
  workflow_dispatch:

jobs:
  build:
    name: Building LawRun Kernel for RMX1971
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      TZ: Africa/Cairo
      DEVICE_CODENAME: "RMX1971"
      # تأكد إن ده اسم الـ defconfig الصح في سورس LawRun (غالباً nanu_perf_defconfig)
      KERNEL_DEFCONFIG: nanu_perf_defconfig
      # رابط الـ Clang المستقر
      CLANG_DL_LINK: "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/master/clang-r416183b.tar.gz"

    steps:
    - name: 📥 Checkout Kernel Source (LawRun)
      uses: actions/checkout@v4
      with:
        path: kernel-source
        fetch-depth: 1

    - name: 📥 Checkout KernelSU (Official/Stable)
      uses: actions/checkout@v4
      with:
        # هنستخدم النسخة الرسمية لأنها مستقرة ومش بتتمسح
        repository: tiann/KernelSU 
        path: ksu-src
        fetch-depth: 1

    - name: 🛠 Move KSU and Patch Kernel
      run: |
        mkdir -p kernel-source/drivers/kernelsu
        cp -r ksu-src/kernel/* kernel-source/drivers/kernelsu/ # بناخد فولدر الـ kernel بس
        
        cd kernel-source
        # حقن الـ KSU
        grep -q "kernelsu" drivers/Kconfig || echo 'source "drivers/kernelsu/Kconfig"' >> drivers/Kconfig
        grep -q "kernelsu" drivers/Makefile || echo 'obj-y += kernelsu/' >> drivers/Makefile
        
        # تفعيل الإعدادات (CONFIG_KSU_NEXT مش هتحتاجها لو استخدمت النسخة الرسمية)
        echo "CONFIG_KSU=y" >> arch/arm64/configs/${{ env.KERNEL_DEFCONFIG }}

    - name: 🛠 Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get -y install --no-install-recommends \
             bc bison build-essential binutils ca-certificates cpio curl \
             device-tree-compiler flex git libssl-dev \
             make python3 python-is-python3 unzip zip xz-utils \
             libelf-dev libncurses5-dev llvm lld \
             gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

    - name: 📥 Download AOSP Clang
      run: |
        mkdir -p clang
        curl -LSs ${{ env.CLANG_DL_LINK }} -o clang.tar.gz
        tar -C clang/ -zxf clang.tar.gz
        echo "$(pwd)/clang/bin" >> $GITHUB_PATH

    - name: 🛠 Move KSU and Patch Kernel
      run: |
        # تجهيز المسار ونقل الملفات يدوياً لحل مشكلة الـ ENOENT
        mkdir -p kernel-source/drivers/kernelsu
        cp -r ksu-src/* kernel-source/drivers/kernelsu/
        
        cd kernel-source
        # حقن الـ KSU في الـ Build System
        grep -q "kernelsu" drivers/Kconfig || echo 'source "drivers/kernelsu/Kconfig"' >> drivers/Kconfig
        grep -q "kernelsu" drivers/Makefile || echo 'obj-y += kernelsu/' >> drivers/Makefile
        
        # تفعيل الإعدادات في الـ Defconfig
        echo "CONFIG_KSU=y" >> arch/arm64/configs/${{ env.KERNEL_DEFCONFIG }}
        echo "CONFIG_KSU_NEXT=y" >> arch/arm64/configs/${{ env.KERNEL_DEFCONFIG }}
        echo ">>> KSU Injected successfully!"

    - name: 🏗 Build Kernel
      run: |
        cd kernel-source
        export ARCH=arm64
        export SUBARCH=arm64
        # نستخدم الـ PATH بتاع الـ Clang اللي حملناه
        export PATH=$(pwd)/../clang/bin:$PATH
        
        echo ">>> Starting Build..."
        make O=out ${{ env.KERNEL_DEFCONFIG }}
        
        make O=out -j$(nproc --all) \
              CC=clang \
              CLANG_TRIPLE=aarch64-linux-gnu- \
              CROSS_COMPILE=aarch64-linux-android- \
              CROSS_COMPILE_ARM32=arm-linux-androideabi- \
              LD=ld.lld \
              AR=llvm-ar \
              NM=llvm-nm \
              OBJCOPY=llvm-objcopy \
              OBJDUMP=llvm-objdump \
              STRIP=llvm-strip \
              KCFLAGS="-w"

    - name: 🚀 Create Flashable Zip (AnyKernel3)
      run: |
        git clone --depth=1 https://github.com/KernelSU-Next/AnyKernel3.git -b master ak3
        # تأكد إن ملف الـ Image.gz-dtb في المسار ده (لو LawRun بيطلعه باسم تاني غيره هنا)
        if [ -f kernel-source/out/arch/arm64/boot/Image.gz-dtb ]; then
          cp kernel-source/out/arch/arm64/boot/Image.gz-dtb ak3/
        else
          cp kernel-source/out/arch/arm64/boot/Image ak3/ || echo "No Image found!"
        fi
        cd ak3 && zip -r9 ../LawRun-KSUN-RMX1971.zip *

    - name: 🚀 Upload Release
      uses: softprops/action-gh-release@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        tag_name: "Build-${{ github.run_number }}"
        name: "LawRun Kernel + KSUN #${{ github.run_number }}"
        files: |
          LawRun-KSUN-RMX1971.zip
